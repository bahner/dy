name: CI / Release

on:
  push:
    branches: ["**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]*"]
  pull_request:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux builds (x86_64-gnu, x86_64-musl, aarch64-musl) via cross ────────
  build-linux:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: dy-x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            artifact: dy-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            artifact: dy-aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/dy ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── macOS ARM64 (native runner) ────────────────────────────────────────────
  build-macos:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/dy dy-aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dy-aarch64-apple-darwin
          path: dy-aarch64-apple-darwin
          retention-days: 1

  # ── Windows x86_64 ─────────────────────────────────────────────────────────
  build-windows:
    name: Build (x86_64-pc-windows-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --target x86_64-pc-windows-gnu

      - name: Rename binary
        run: cp target/x86_64-pc-windows-gnu/release/dy.exe dy-x86_64-pc-windows-gnu.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dy-x86_64-pc-windows-gnu.exe
          path: dy-x86_64-pc-windows-gnu.exe
          retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
